---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-persistentvolume
  namespace: spring-petclinic-rest
  labels:
    environment: pulaumerah
spec:
  capacity:
    storage: 512Mi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: local-storage
  local:
    # Path convention: `/var/local/volumes/[metadata.namespace]/[metadata.name]`
    path: /var/local/volumes/spring-petclinic-rest/postgres-persistentvolume
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - pulaumerah
